name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch — saves CI minutes when pushing
# fixups in quick succession.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # `npm ci` requires a committed lockfile and refuses to mutate it.
      - name: Install
        run: npm ci --no-audit --no-fund

      # Static analysis — fails the build on real bugs (no-unused-vars,
      # no-undef, etc.); warnings (stylistic) are surfaced but not blocking.
      - name: Lint (errors only)
        run: npm run lint:errors

      - name: Test
        run: npm test

      # Build with a placeholder VITE_PB_URL so we don't bake any real URL
      # into a CI artifact. The bundle is discarded after build verification.
      - name: Build
        env:
          VITE_PB_URL: 'https://ci-placeholder.invalid'
          VITE_RELEASE: ${{ github.sha }}
        run: npm run build

      - name: Bundle size budget
        run: npm run size

      - name: Audit (high+critical only, prod deps)
        # Don't fail the build on advisories yet — just surface them.
        # Flip to `--audit-level=high` (no `|| true`) once the inventory is clean.
        run: npm audit --omit=dev --audit-level=high || true

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build
        env:
          VITE_PB_URL: 'https://ci-placeholder.invalid'
        run: npm run build

      - name: Run Playwright smoke tests
        env:
          CI: 'true'
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
