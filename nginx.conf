# Flow — production static-server config.
# Mounted at /etc/nginx/conf.d/default.conf inside the container.
#
# Why nginx, not `serve`:
#   - Real Cache-Control on hashed assets (immutable + 1-year TTL).
#   - `index.html` always re-validated, so deploys propagate immediately.
#   - Security headers that <meta http-equiv> CSP can't set (frame-ancestors,
#     HSTS, Permissions-Policy).
#   - Proper SIGTERM handling under orchestration.
#
# The app has no client-side router, so /index.html fallback is included only
# defensively — if a deep link is ever added it won't 404.

server {
  listen      8080 default_server;
  listen      [::]:8080 default_server;
  server_name _;
  root        /usr/share/nginx/html;
  index       index.html;

  # ── Security headers ─────────────────────────────────────────────────────
  # CSP also lives in <meta http-equiv> for defense-in-depth, but only the
  # HTTP-header form can set frame-ancestors (browsers ignore it on meta).
  # Keep this list in sync with index.html's <meta> CSP.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;
  add_header X-Frame-Options              "DENY"                                  always;
  add_header X-Content-Type-Options       "nosniff"                               always;
  add_header Referrer-Policy              "strict-origin-when-cross-origin"       always;
  add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
  # HSTS only takes effect over HTTPS; harmless over HTTP.
  add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains"   always;

  # ── Compression ──────────────────────────────────────────────────────────
  gzip                on;
  gzip_vary           on;
  gzip_proxied        any;
  gzip_comp_level     6;
  gzip_min_length     1024;
  gzip_types
    application/javascript
    application/json
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # ── Hashed assets — immutable, far-future cache ──────────────────────────
  # Vite emits filenames like `index-DBy5sa8c.js` whose hash changes on every
  # content change, so it's safe to tell the browser to never revalidate.
  location ^~ /assets/ {
    access_log  off;
    add_header  Cache-Control "public, max-age=31536000, immutable" always;
    try_files   $uri =404;
  }

  # ── Entry HTML — always revalidate ───────────────────────────────────────
  # No-cache here means "ask the server if it changed" — if the response
  # body is identical the browser still uses its cached copy. Deploys
  # propagate within one revalidation round trip.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # ── Everything else: SPA fallback ────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Hide nginx version in error pages and Server header.
  server_tokens off;
}
